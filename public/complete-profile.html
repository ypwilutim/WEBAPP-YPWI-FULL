<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lengkapi Profil - YPWI Lutim</title>

  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="Lengkapi Profil - Sistem Absensi YPWI Lutim">
  <meta property="og:description"
    content="Lengkapi profil Anda untuk menggunakan Sistem Absensi Guru YPWI Lutim dengan fitur GPS dan QR Code">
  <meta property="og:image" content="/assets/images/thumbnail/complete profile.svg">
  <meta property="og:url" content="">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="YPWI Lutim Absensi">

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Lengkapi Profil - Sistem Absensi YPWI Lutim">
  <meta name="twitter:description"
    content="Lengkapi profil Anda untuk menggunakan Sistem Absensi Guru YPWI Lutim dengan fitur GPS dan QR Code">
  <meta name="twitter:image" content="/assets/images/thumbnail/complete profile.svg">

  <!-- General Meta Tags -->
  <meta name="description"
    content="Lengkapi profil Anda untuk menggunakan Sistem Absensi Guru YPWI Lutim dengan fitur GPS dan QR Code">
  <meta name="keywords" content="profil lengkap, sistem absensi, YPWI Lutim, GPS absensi, setup profil">
  <meta name="author" content="YPWI Lutim">

  <script>
    // Set dynamic og:url based on current location
    document.querySelector('meta[property="og:url"]').setAttribute('content', window.location.href);
  </script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen py-8 profile-page">
  <div class="pt-28 pb-12">
    <div class="max-w-7xl mx-auto px-6">
      <div class="glass rounded-3xl shadow-2xl p-10 border border-gray-100">
        <div class="text-center mb-10 float-animation">
          <div class="w-20 h-20 mx-auto mb-4 rounded-2xl bg-white flex items-center justify-center shadow-lg p-2">
            <img src="assets/images/YPWI LOGO HITAM.png" alt="YPWI Logo" class="w-full h-full object-contain">
          </div>
          <h1 class="text-4xl font-extrabold text-gray-950">Lengkapi Profil Guru</h1>
          <p class="text-gray-600 mt-2 text-lg">Lengkapi data pribadi Anda untuk akses sistem dan administrasi.</p>
        </div>

        <form id="profileForm">
          <input type="hidden" id="teacherId" name="teacherId">
          <input type="hidden" id="link_foto" name="link_foto">
          <input type="hidden" id="assignments_json" name="assignments" required>

          <div class="grid md:grid-cols-2 gap-10">
            <!-- Kolom Kiri: Data Identitas Pribadi -->
            <div class="space-y-6">
              <h3 class="text-xl font-bold text-gray-900 flex items-center gap-2 border-b pb-3">
                <i class="bi bi-person-badge text-primary"></i> Data Identitas Pribadi
              </h3>

              <div>
                <label for="nama" class="block text-sm font-semibold text-gray-700 mb-2">Nama Lengkap <span
                    class="text-red-500">*</span></label>
                <input type="text" id="nama" name="nama" required
                  class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 bg-white focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition font-medium">
              </div>

              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label for="nip" class="block text-sm font-semibold text-gray-700 mb-2">NIY</label>
                  <input type="text" id="nip" name="nip"
                    class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 bg-white outline-none font-medium"
                    placeholder="NIY">
                </div>
                <div>
                  <label for="nik" class="block text-sm font-semibold text-gray-700 mb-2">NIK <span
                      class="text-red-500">*</span></label>
                  <input type="text" id="nik" name="nik" required
                    class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 bg-white outline-none font-medium"
                    placeholder="NIK">
                </div>
              </div>

              <div>
                <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Email Aktif <span
                    class="text-red-500">*</span></label>
                <input type="email" id="email" name="email" required
                  class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 bg-white focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition font-medium">
              </div>

              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label for="tempat_lahir" class="block text-sm font-semibold text-gray-700 mb-2">Tempat Lahir <span
                      class="text-red-500">*</span></label>
                  <input type="text" id="tempat_lahir" name="tempat_lahir" required
                    class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 bg-white outline-none font-medium">
                </div>
                <div>
                  <label for="tanggal_lahir" class="block text-sm font-semibold text-gray-700 mb-2">Tanggal Lahir <span
                      class="text-red-500">*</span></label>
                  <input type="date" id="tanggal_lahir" name="tanggal_lahir" required
                    class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 bg-white outline-none font-medium">
                </div>
              </div>

              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label for="jenis_kelamin" class="block text-sm font-semibold text-gray-700 mb-2">Jenis Kelamin <span
                      class="text-red-500">*</span></label>
                  <select id="jenis_kelamin" name="jenis_kelamin" required
                    class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 bg-white outline-none font-medium">
                    <option value="">Pilih</option>
                    <option value="L">Laki-laki</option>
                    <option value="P">Perempuan</option>
                  </select>
                </div>
                <div>
                  <label for="no_wa" class="block text-sm font-semibold text-gray-700 mb-2">No. WhatsApp <span
                      class="text-red-500">*</span></label>
                  <input type="tel" id="no_wa" name="no_wa" placeholder="08xxxxxxxx" required
                    class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 bg-white outline-none font-medium">
                </div>
              </div>

              <div>
                <label for="alamat" class="block text-sm font-semibold text-gray-700 mb-2">Alamat Lengkap <span
                    class="text-red-500">*</span></label>
                <textarea id="alamat" name="alamat" rows="3" required
                  class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 bg-white outline-none transition text-gray-700 resize-none"
                  placeholder="Masukkan alamat lengkap..."></textarea>
              </div>

            </div>

            <!-- Kolom Kanan: Kepegawaian -->
            <div class="space-y-6">
              <h3 class="text-xl font-bold text-gray-900 flex items-center gap-2 border-b pb-3">
                <i class="bi bi-briefcase text-primary"></i> Data Kepegawaian
              </h3>

              <div>
                <label for="status_kepegawaian" class="block text-sm font-semibold text-gray-700 mb-2">Status Pegawai
                  <span class="text-red-500">*</span></label>
                <select id="status_kepegawaian" name="status_kepegawaian" required
                  class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 bg-white outline-none font-medium">
                  <option value="">Pilih Status</option>
                  <option value="PTY">PTY</option>
                  <option value="PKY">PKY</option>
                  <option value="Honor">Honor</option>
                </select>
              </div>

              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label for="status_aktif" class="block text-sm font-semibold text-gray-700 mb-2">Status Aktif <span
                      class="text-red-500">*</span></label>
                  <select id="status_aktif" name="status_aktif" required
                    class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 bg-white outline-none font-medium">
                    <option value="1">Aktif</option>
                    <option value="0">Tidak Aktif</option>
                  </select>
                </div>
                <div>
                  <label for="tmt" class="block text-sm font-semibold text-gray-700 mb-2">TMT (Tanggal Masuk) <span
                      class="text-red-500">*</span></label>
                  <input type="date" id="tmt" name="tmt" required
                    class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 bg-white outline-none font-medium">
                </div>
              </div>



              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Penempatan di Unit Sekolah <span
                    class="text-red-500">*</span></label>
                <button type="button" id="addAssignmentBtn"
                  class="w-full py-3 px-4 bg-primary/10 text-primary border-2 border-dashed border-primary/30 rounded-xl font-bold hover:bg-primary/20 transition flex items-center justify-center gap-2">
                  <i class="bi bi-plus-circle"></i> Tambah Penempatan Unit
                </button>
                <div id="assignments-container"
                  class="mt-4 overflow-hidden border border-gray-200 rounded-xl shadow-inner">
                  <table class="w-full text-sm">
                    <thead class="bg-gray-100 text-gray-700 border-b">
                      <tr>
                        <th class="px-4 py-3 text-left">Unit Sekolah</th>
                        <th class="px-4 py-3 text-left">Jabatan</th>
                        <th class="px-4 py-3 text-center">Aksi</th>
                      </tr>
                    </thead>
                    <tbody id="assignments-table-body" class="bg-white divide-y divide-gray-100"></tbody>
                  </table>
                </div>
              </div>

              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Upload Pas Foto</label>
                <div class="flex items-center gap-4 bg-gray-50 border border-gray-200 p-4 rounded-2xl">
                  <div
                    class="border-2 border-dashed border-gray-300 rounded-xl p-3 text-center flex-1 hover:border-primary transition cursor-pointer"
                    id="photoUploadArea">
                    <input type="file" class="hidden" id="foto" name="foto" accept="image/*">
                    <i class="bi bi-camera-fill text-primary text-3xl mb-2"></i>
                    <p class="text-gray-700 font-medium text-sm mb-1">Klik untuk upload foto</p>
                  </div>
                  <div
                    class="w-20 h-20 rounded-2xl border-2 border-gray-200 overflow-hidden bg-white flex-shrink-0 flex items-center justify-center relative">
                    <img id="photo-preview" class="w-full h-full object-cover hidden">
                    <i class="bi bi-person text-gray-400 text-3xl absolute" id="photo-icon"></i>
                  </div>
                </div>
                <div id="existing-photo-info" class="mt-2 hidden">
                  <small class="text-green-600">
                    <i class="bi bi-check-circle-fill mr-1"></i>
                    Foto sudah tersimpan di database
                  </small>
                </div>
              </div>
            </div>
          </div>

          <div class="pt-10 border-t border-gray-100">
            <button type="submit"
              class="w-full max-w-lg mx-auto bg-[#066e3a] text-white font-extrabold py-4 px-8 rounded-3xl text-xl flex items-center justify-center gap-3 shadow-lg transform hover:scale-[1.02] transition">
              <i class="bi bi-cloud-arrow-up-fill"></i>
              SIMPAN DATA PROFIL
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Modal Penempatan -->
  <div id="modal-penempatan"
    class="hidden fixed inset-0 z-[999] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
    <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl scale-95 transition-all duration-300">
      <h3 class="text-xl font-bold text-gray-950 mb-6 flex items-center gap-2">
        <i class="bi bi-building-add text-primary"></i> Tambah Penempatan Unit
      </h3>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Unit Sekolah</label>
          <select id="assignmentUnit" required
            class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-primary outline-none font-medium">
            <option value="">Pilih Unit Sekolah</option>
            <!-- Options populated by JavaScript -->
          </select>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Jabatan</label>
          <select id="assignmentJabatan" required
            class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-primary outline-none font-medium">
            <option value="">Pilih Jabatan</option>
            <option value="Pimpinan">Pimpinan</option>
            <option value="Admin">Admin</option>
            <option value="Operator">Operator</option>
            <option value="Tata Usaha (TU)">Tata Usaha (TU)</option>
            <option value="Bendahara">Bendahara</option>
            <option value="Walikelas">Walikelas</option>
            <option value="Guru Mapel">Guru Mapel</option>
            <option value="Security">Security</option>
            <option value="Driver">Driver</option>
            <option value="Cleaning Service">Cleaning Service</option>
          </select>
        </div>
      </div>

      <div class="flex items-center justify-end gap-3 mt-8">
        <button type="button" id="closeAssignmentBtn"
          class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition">Batal</button>
        <button type="button" id="saveAssignmentBtn"
          class="px-5 py-2.5 bg-[#066e3a] text-white rounded-xl font-bold hover:bg-[#066e3a]/90 transition flex items-center gap-1.5">
          <i class="bi bi-check-circle"></i> Tambahkan
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    // Authentication bypassed - allow access without login

    // Get teacher ID from URL parameter or sessionStorage
    const urlParams = new URLSearchParams(window.location.search);
    const teacherId = urlParams.get('teacher_id') || sessionStorage.getItem('teacherId');

    if (!teacherId) {
      Swal.fire({ title: 'Akses Tidak Sah', text: 'ID Guru tidak ditemukan.', icon: 'error', confirmButtonColor: '#667eea' }).then(() => {
        if (user.role === 'admin') {
          window.location.href = 'admin-dashboard.html';
        } else {
          window.location.href = 'login.html';
        }
      });
      throw new Error('No teacher ID');
    }

    document.getElementById('teacherId').value = teacherId;

    // Fetch teacher data
    fetchTeacherData();
    fetchTenants();

    async function fetchTeacherData() {
      try {
        const response = await fetch(`/api/public/teachers/${teacherId}`);

        if (response.ok) {
          const res = await response.json();
          if (res.success && res.data) {
            const teacher = res.data;
            populateForm(teacher);
            // Load existing assignments into local storage
            localAssignments = teacher.assignments || [];
            displayAssignments(localAssignments);
          }
        }
      } catch (error) {
        console.error('Error fetching teacher data:', error);
      }
    }

    async function fetchTenants() {
      try {
        const response = await fetch('/api/tenants');
        if (response.ok) {
          const res = await response.json();
          if (res.success) {
            populateTenantSelect(res.data);
          }
        }
      } catch (error) {
        console.error('Error fetching tenants:', error);
      }
    }

    function populateTenantSelect(tenants) {
      const select = document.getElementById('assignmentUnit');
      select.innerHTML = '<option value="">Pilih Unit Sekolah</option>';
      tenants.forEach(tenant => {
        const option = document.createElement('option');
        option.value = tenant.tenant_id;
        option.textContent = `${tenant.nama_sekolah} (${tenant.tenant_id})`;
        select.appendChild(option);
      });
    }

    function populateForm(teacher) {
      const setValue = (id, value) => {
        const el = document.getElementById(id);
        if (el) el.value = value || '';
      };



      setValue('nama', teacher.nama);
      setValue('nik', teacher.nik);
      setValue('tempat_lahir', teacher.tempat_lahir);
      setValue('tanggal_lahir', teacher.tanggal_lahir);
      setValue('jenis_kelamin', teacher.jenis_kelamin);
      setValue('alamat', teacher.alamat);
      setValue('email', teacher.email);
      setValue('no_wa', teacher.no_wa);
      setValue('nip', teacher.nip);
      setValue('status_kepegawaian', teacher.status_kepegawaian);
      setValue('tmt', teacher.tmt);
      setValue('status_aktif', teacher.status_aktif);
      setValue('link_foto', teacher.link_foto);

      if (teacher.link_foto) {
        document.getElementById('photo-preview').src = teacher.link_foto;
        document.getElementById('photo-preview').classList.remove('hidden');
        document.getElementById('photo-icon').classList.add('hidden');
        document.getElementById('existing-photo-info').classList.remove('hidden');
      } else {
        document.getElementById('existing-photo-info').classList.add('hidden');
      }
    }

    // Store assignments locally (not in database until final submit)
    let localAssignments = [];

    function displayAssignments(assignments) {
      // Load existing assignments from database
      if (assignments && assignments.length > 0) {
        localAssignments = [...assignments];
      }

      const tbody = document.getElementById('assignments-table-body');
      tbody.innerHTML = localAssignments.map((assignment, index) => `
        <tr>
          <td class="px-4 py-3">${assignment.tenant_id}</td>
          <td class="px-4 py-3">${assignment.jabatan_di_unit}</td>
          <td class="px-4 py-3 text-center">
            <button data-index="${index}" data-action="remove-assignment" class="text-red-600 hover:text-red-800 remove-assignment-btn">
              <i class="bi bi-trash"></i>
            </button>
          </td>
        </tr>
      `).join('');
    }

    const form = document.getElementById('profileForm');
    // Form validation functions
    function validateEmail(email) {
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return emailRegex.test(email);
    }

    function validateNIK(nik) {
      const nikRegex = /^\d{16}$/;
      return nikRegex.test(nik);
    }

    function validatePhone(phone) {
      // Indonesian phone number format: +62/62/0 followed by 8-12 digits
      const phoneRegex = /^(\+62|62|0)[8-9][0-9]{7,11}$/;
      return phoneRegex.test(phone.replace(/\s+/g, ''));
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Client-side validation
      const email = document.getElementById('email').value.trim();
      const nik = document.getElementById('nik').value.trim();
      const noWa = document.getElementById('no_wa').value.trim();

      if (!validateNIK(nik)) {
        Swal.fire('Error', 'NIK harus terdiri dari 16 digit angka.', 'error');
        return;
      }

      if (email && !validateEmail(email)) {
        Swal.fire('Error', 'Format email tidak valid.', 'error');
        return;
      }

      if (noWa && !validatePhone(noWa)) {
        Swal.fire('Error', 'Format nomor WhatsApp tidak valid. Gunakan format Indonesia (08xxxxxxxxx).', 'error');
        return;
      }

      const submitBtn = form.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<div class="inline-block animate-spin rounded-full h-5 w-5 border-4 border-white border-t-transparent mr-2"></div>Menyimpan...';

      try {
        const formData = new FormData(form);

        // Add assignments from local storage as JSON string to form data
        formData.append('assignments_json', JSON.stringify(localAssignments));

        const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
        const response = await fetch(`/api/admin/teachers/${formData.get('teacherId')}`, {
          method: 'PUT',
          headers: headers,
          body: formData
        });

        if (response.ok) {
          // Update profile completion status using public endpoint
          await fetch(`/api/profile-complete/${teacherId}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json'
            }
          });

          // Send WhatsApp notification
          try {
            const noWa = document.getElementById('no_wa').value.trim();
            const nama = document.getElementById('nama').value.trim();
            const jenisKelamin = document.getElementById('jenis_kelamin').value;
            const email = document.getElementById('email').value.trim();

            if (noWa && nama && email) {
              const content = `Selamat! Profil Anda di Sistem YPWI Lutim telah berhasil dilengkapi.

Anda sekarang dapat login menggunakan:
📧 Email: ${email}
🔑 Password: ypwi123 (segera ganti setelah login pertama)

Silakan login dan ubah password default Anda untuk keamanan.`;

              // Send WhatsApp in background (don't wait for response)
              fetch('/api/send-whatsapp-public', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  number: noWa,
                  message: content,
                  type: 'profile_completed',
                  nama: nama,
                  jenis_kelamin: jenisKelamin,
                  teacherId: teacherId
                })
              }).catch(err => console.log('WhatsApp notification failed:', err));
            }
          } catch (waError) {
            console.log('WhatsApp notification error:', waError);
          }

          Swal.fire({
            title: 'Berhasil!',
            text: 'Profil berhasil diperbarui! Akun login telah dibuat otomatis.',
            icon: 'success',
            timer: 3000,
            timerProgressBar: true,
            showConfirmButton: false
          }).then(() => {
            window.location.href = 'login.html';
          });
        } else {
          throw new Error('Update failed');
        }
      } catch (error) {
        Swal.fire({ title: 'Gagal', text: 'Terjadi kesalahan. Silakan coba lagi.', icon: 'error', confirmButtonText: 'OK' });
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="bi bi-cloud-arrow-up-fill"></i> SIMPAN DATA PROFIL';
      }
    });

    form.querySelectorAll('input[required]').forEach(input => {
      input.addEventListener('blur', () => {
        if (!input.value.trim()) {
          input.style.borderColor = '#ef4444';
        } else {
          input.style.borderColor = '#d1d5db';
        }
      });
      input.addEventListener('input', () => {
        input.style.borderColor = '#667eea';
      });
    });

    // Assignment functions
    function addAssignment() {
      document.getElementById('modal-penempatan').classList.remove('hidden');
      document.getElementById('modal-penempatan').classList.add('flex');
    }

    function closeAssignmentModal() {
      document.getElementById('modal-penempatan').classList.add('hidden');
      document.getElementById('modal-penempatan').classList.remove('flex');
      document.getElementById('assignmentUnit').value = '';
      document.getElementById('assignmentJabatan').value = '';
    }

    function saveAssignment() {
      const tenantId = document.getElementById('assignmentUnit').value;
      const jabatan = document.getElementById('assignmentJabatan').value;

      if (!tenantId || !jabatan) {
        alert('Pilih Unit Sekolah dan Jabatan');
        return;
      }

      // Check if assignment already exists locally
      const exists = localAssignments.some(a => a.tenant_id === tenantId && a.jabatan_di_unit === jabatan);
      if (exists) {
        alert('Penugasan ini sudah ada');
        return;
      }

      // Add to local assignments array
      localAssignments.push({
        tenant_id: tenantId,
        jabatan_di_unit: jabatan
      });

      // Refresh display
      displayAssignments();

      // Close modal
      closeAssignmentModal();

      // Clear form
      document.getElementById('assignmentUnit').value = '';
      document.getElementById('assignmentJabatan').value = '';
    }

    function removeAssignment(index) {
      if (!confirm('Hapus penugasan ini?')) return;

      // Remove from local assignments array
      localAssignments.splice(index, 1);

      // Refresh display
      displayAssignments();
    }

    // Photo preview
    function previewPhoto(input) {
      const file = input.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          document.getElementById('photo-preview').src = e.target.result;
          document.getElementById('photo-preview').classList.remove('hidden');
          document.getElementById('photo-icon').classList.add('hidden');
          document.getElementById('existing-photo-info').classList.add('hidden');
        };
        reader.readAsDataURL(file);
      }
    }

    // Event listeners for CSP compliance
    document.addEventListener('DOMContentLoaded', function () {
      // Add assignment button
      document.getElementById('addAssignmentBtn')?.addEventListener('click', addAssignment);

      // Photo upload area
      document.getElementById('photoUploadArea')?.addEventListener('click', function () {
        document.getElementById('foto').click();
      });

      // Photo input change
      document.getElementById('foto')?.addEventListener('change', function (e) {
        previewPhoto(e.target);
      });

      // Assignment modal buttons
      document.getElementById('closeAssignmentBtn')?.addEventListener('click', closeAssignmentModal);
      document.getElementById('saveAssignmentBtn')?.addEventListener('click', saveAssignment);

      // Remove assignment buttons (event delegation)
      document.addEventListener('click', function (e) {
        if (e.target.closest('.remove-assignment-btn')) {
          const btn = e.target.closest('.remove-assignment-btn');
          const index = parseInt(btn.getAttribute('data-index'));
          removeAssignment(index);
        }
      });
    });
  </script>
</body>

</html>
